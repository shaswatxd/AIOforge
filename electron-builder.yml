appId: com.aioforge.app
productName: AIOforge
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Fixed (unversioned) artifact name so releases/latest/download/AIOforge-Setup.exe is a
# permanent link the website can point at without updating it on every release.
artifactName: '${productName}-Setup.${ext}'
win:
  target:
    # nsis-web: a tiny (~a few MB) stub installer that downloads the actual app package
    # from the GitHub release during setup, instead of bundling the full ~90MB inside the
    # installer exe — same idea as Discord/Chrome's web installers.
    - target: nsis-web
      arch:
        - x64
  icon: build/icon.ico
  # asInvoker: app launches unelevated, matching elevate.ts's per-action UAC design
  # (single elevated prompt only for the specific winget/choco command that needs it).
  # requireAdministrator here would force the WHOLE process elevated at all times, which
  # breaks winget's own uninstall guard — winget refuses to uninstall a user-scope
  # package while the calling process is elevated ("cannot be uninstalled when running
  # with administrator privileges"), so every user-scope uninstall would fail.
  requestedExecutionLevel: asInvoker
nsis:
  # Discord/Slack-style installer: no wizard pages, just a small animated "Installing…"
  # window that installs per-user (no UAC needed for the install step itself) and
  # launches the app when done.
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: always
  runAfterFinish: true
publish:
  provider: github
  owner: shaswatxd
  repo: AIOforge
  releaseType: release # publish directly instead of leaving a draft (default) so the
  # download link and auto-updater feed work immediately after the workflow runs
