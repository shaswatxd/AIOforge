appId: com.aioforge.app
productName: AIOforge
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Fixed (unversioned) artifact name so releases/latest/download/AIOforge-Setup.exe is a
# permanent link the website can point at without updating it on every release.
artifactName: '${productName}-Setup.${ext}'
win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: build/icon.ico   # add a real .ico before packaging — see README
  # System-wide installs/uninstalls (winget/choco/registry tweaks) need admin rights —
  # without this the packaged app launches unelevated and installers fail with generic
  # errors like MSI 1603 "insufficient privileges". Windows will UAC-prompt on launch.
  requestedExecutionLevel: requireAdministrator
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: shaswatxd
  repo: AIOforge
  releaseType: release # publish directly instead of leaving a draft (default) so the
  # download link and auto-updater feed work immediately after the workflow runs
