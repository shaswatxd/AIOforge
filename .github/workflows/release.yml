name: Release

# Push a tag like "v0.1.0" to build the Windows installer and publish it (plus
# latest.yml, needed by electron-updater) to a GitHub Release automatically.
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required so electron-builder can create/upload the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Build installer and publish
        run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
